<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Water Systems — Find Your System</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #1a1a1a; }
  .quiz-wrap { max-width: 580px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
  .brand-row { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; }
  .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; }
  .brand-label { font-size: 12px; color: #888; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
  .progress-track { height: 3px; background: #eee; border-radius: 2px; margin-bottom: 2rem; }
  .progress-fill { height: 3px; background: #1D9E75; border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .step-counter { font-size: 12px; color: #aaa; margin-bottom: 0.6rem; }
  .question-text { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 0.4rem; line-height: 1.35; }
  .question-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opts.cols-1 { grid-template-columns: 1fr; }
  .opts.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  .opt { background: #fff; border: 1.5px solid #e5e5e5; border-radius: 12px; padding: 14px 15px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; transition: border-color 0.15s, background 0.15s; text-align: left; width: 100%; }
  .opt:hover { border-color: #1D9E75; background: #f0faf6; }
  .opt.sel { border-color: #1D9E75; border-width: 2px; background: #f0faf6; }
  .opt-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .opt-label { font-size: 14px; font-weight: 600; color: #111; }
  .opt-desc { font-size: 12px; color: #888; margin-top: 2px; line-height: 1.4; }
  .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; }
  .btn-back { background: none; border: 1.5px solid #e5e5e5; border-radius: 8px; padding: 10px 20px; font-size: 14px; color: #666; cursor: pointer; font-family: inherit; }
  .btn-back:hover { border-color: #ccc; background: #f9f9f9; }
  .btn-next { background: #1D9E75; border: none; border-radius: 8px; padding: 12px 28px; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit; opacity: 0.35; pointer-events: none; transition: opacity 0.2s, background 0.15s; }
  .btn-next.on { opacity: 1; pointer-events: all; }
  .btn-next.on:hover { background: #0F6E56; }
  /* Result styles */
  .result-wrap { animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  .result-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #1D9E75; margin-bottom: 0.5rem; }
  .result-heading { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .rec-card { border: 1.5px solid #e5e5e5; border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .rec-card-header { background: #f8f8f8; padding: 1rem 1.25rem; border-bottom: 1px solid #eee; }
  .rec-badge { display: inline-block; background: #e0f5ed; color: #0b7a52; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 0.6rem; }
  .rec-name { font-size: 19px; font-weight: 700; color: #111; }
  .rec-body { padding: 1.25rem; }
  .rec-why { font-size: 14px; color: #555; line-height: 1.65; margin-bottom: 1rem; }
  .rec-features { list-style: none; margin-bottom: 1.25rem; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .rec-features li { font-size: 13px; color: #555; padding-left: 14px; position: relative; }
  .rec-features li::before { content: ''; position: absolute; left: 0; top: 7px; width: 5px; height: 5px; border-radius: 50%; background: #1D9E75; }
  .rec-price { font-size: 17px; font-weight: 700; color: #111; margin-bottom: 1rem; }
  .rec-price span { font-size: 12px; color: #aaa; font-weight: 400; margin-left: 6px; }
  .btn-shop { display: block; width: 100%; background: #1D9E75; color: #fff; border: none; border-radius: 9px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; font-family: inherit; transition: background 0.15s; }
  .btn-shop:hover { background: #0F6E56; }
  .btn-phone { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; background: none; border: 1.5px solid #e5e5e5; border-radius: 9px; padding: 12px; font-size: 14px; color: #555; cursor: pointer; text-decoration: none; font-family: inherit; margin-top: 8px; transition: border-color 0.15s; }
  .btn-phone:hover { border-color: #bbb; background: #f9f9f9; }
  .restart { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #bbb; cursor: pointer; }
  .restart:hover { color: #888; text-decoration: underline; }
</style>
</head>
<body>
<div class="quiz-wrap">
  <div class="brand-row"><div class="brand-dot"></div><span class="brand-label">Shell Water Systems — Find your system</span></div>
  <div class="progress-track"><div class="progress-fill" id="prog" style="width:20%"></div></div>
  <div id="body"></div>
</div>
<script>
const steps=[
  {id:'source',label:'Step 1 of 5',q:'Where does your home water come from?',sub:'This affects the type of filtration you need.',multi:false,cols:2,opts:[
    {v:'city',i:'🏙️',l:'City / Municipal',d:'Treated tap water from a utility'},
    {v:'well',i:'🌿',l:'Private well',d:'Untreated groundwater'}
  ]},
  {id:'problems',label:'Step 2 of 5',q:'What water problems are you dealing with?',sub:'Select all that apply.',multi:true,cols:2,opts:[
    {v:'hardness',i:'🪨',l:'Hard water / scale',d:'Buildup on faucets, dishes, appliances'},
    {v:'taste',i:'💧',l:'Bad taste or odor',d:'Chlorine smell, musty, or off flavors'},
    {v:'skin',i:'✋',l:'Dry hair & skin',d:'Dullness after showering'},
    {v:'contaminants',i:'⚗️',l:'Contaminants',d:'PFAS, heavy metals, chloramine'},
    {v:'iron',i:'🟤',l:'Rotten egg / iron',d:'H2S smell, rust stains, well water'},
    {v:'unsure',i:'❓',l:'Not sure',d:'Just want cleaner water overall'}
  ]},
  {id:'drinking',label:'Step 3 of 5',q:'Do you want filtered drinking water at the tap?',sub:'In addition to whole-home treatment.',multi:false,cols:2,opts:[
    {v:'yes',i:'🥤',l:'Yes — add drinking water',d:'Under-sink RO system at kitchen tap'},
    {v:'no',i:'🏠',l:'No — whole home is enough',d:'Single system for all water'}
  ]},
  {id:'bathrooms',label:'Step 4 of 5',q:'How many bathrooms does your home have?',sub:'Helps us size the right system for your flow rate.',multi:false,cols:3,opts:[
    {v:'1-3',i:'🛁',l:'1–3',d:'Small home'},
    {v:'4-6',i:'🏡',l:'4–6',d:'Medium home'},
    {v:'7+',i:'🏘️',l:'7+',d:'Large home'}
  ]},
  {id:'salt',label:'Step 5 of 5',q:'Salt-based or salt-free?',sub:'Both work well — different trade-offs.',multi:false,cols:2,opts:[
    {v:'salt',i:'💪',l:'Salt-based',d:'Most effective softening, requires refills'},
    {v:'saltfree',i:'🌱',l:'Salt-free',d:'Low maintenance, eco-friendly'},
    {v:'unsure',i:'🤷',l:'Not sure',d:'Recommend whatever works best'}
  ]}
];
const prods={
  iron:{name:'H2S / Iron Removal Unit',badge:'Well water specialist',price:'$2,644',ps:'',why:'Your well water contains H2S sulfur and iron — these require a dedicated removal system. This unit eliminates rotten egg odor and rust staining before they enter your home.',features:['Removes H2S sulfur odor','Eliminates iron & rust stains','Built for well water','Lifetime tank & valve warranty'],url:'https://shellwatersystems.com/product/h2s-iron-removal-unit-for-well-water/'},
  saltCombo:{name:'Salt Based Softener with Whole House Filtration',badge:'Most popular combo',price:'$2,664–$3,900',ps:'',why:'You need both softening and filtration — this combo eliminates hard water and removes chlorine, sediment, and contaminants throughout your home in one system.',features:['Eliminates hard water scale','Removes chlorine & sediment','Sized to your home','Free shipping + lifetime warranty'],url:'https://shellwatersystems.com/product/salt-base-water-softener-with-whole-house-filtration/'},
  saltFreeCombo:{name:'Go Natural Salt Free Conditioner + Whole House Filtration',badge:'Eco-friendly combo',price:'$2,808–$4,196',ps:'',why:'You want soft, filtered water without salt maintenance. This system conditions and filters your whole home with zero brine discharge — the low-hassle choice.',features:['No salt or brine waste','Conditions AND filters whole home','Low maintenance','Lifetime warranty'],url:'https://shellwatersystems.com/product/filter-softener-combos/'},
  saltSoftener:{name:'Salt Based Water Softener',badge:'Best for hard water',price:'$1,773–$2,227',ps:'',why:'Hard water is your primary issue. Salt-based softening is the gold standard — it fully removes hardness minerals, protects appliances, and leaves hair and skin feeling noticeably softer.',features:['Removes hardness minerals','Protects appliances & pipes','Eliminates scale buildup','Sized to your home'],url:'https://shellwatersystems.com/product/salt-based-water-softener/'},
  saltFreeSoftener:{name:'Go Natural Salt Free Conditioner',badge:'Salt-free softening',price:'$1,772–$2,374',ps:'',why:'Conditioned water without the salt. This system prevents scale naturally and requires minimal maintenance — ideal if you want results without the upkeep.',features:['No salt required','Prevents scale naturally','Low maintenance','Lifetime warranty'],url:'https://shellwatersystems.com/product/go-natural-salt-free-conditioner/'},
  wholeHouse:{name:'Whole House Filtration',badge:'Filtration focus',price:'$1,354–$2,267',ps:'',why:'Your main concern is filtration — removing chlorine, sediment, taste, and odor from every tap in your home.',features:['Removes chlorine & chloramine','Reduces sediment','Better taste & odor whole home','Sized to your home'],url:'https://shellwatersystems.com/product/double-filtration/'},
  ro:{name:'Pure Aqua Tankless Reverse Osmosis',badge:'Drinking water add-on',price:'$697',ps:'',why:'The cleanest possible drinking water at your kitchen tap. Removes up to 99% of contaminants including PFAS, heavy metals, and nitrates.',features:['Removes PFAS & heavy metals','Tankless — compact design','5 finish colors','Pairs with any whole-home system'],url:'https://shellwatersystems.com/product/pure-aqua-tankless-reverse-osmosis/'}
};
let ans={},cur=0;
function getRec(){
  const p=Array.isArray(ans.problems)?ans.problems:[ans.problems||''];
  if(p.includes('iron')||ans.source==='well') return prods.iron;
  const soft=p.includes('hardness')||p.includes('skin');
  const filt=p.includes('taste')||p.includes('contaminants')||p.includes('unsure');
  if(soft&&filt) return ans.salt==='saltfree'?prods.saltFreeCombo:prods.saltCombo;
  if(soft) return ans.salt==='saltfree'?prods.saltFreeSoftener:prods.saltSoftener;
  return prods.wholeHouse;
}
function render(i){
  const s=steps[i];
  document.getElementById('prog').style.width=(((i+1)/steps.length)*100)+'%';
  const sel=ans[s.id]||(s.multi?[]:null);
  const hasAns=s.multi?(sel&&sel.length>0):sel!==null;
  document.getElementById('body').innerHTML=`
    <div class="step-counter">${s.label}</div>
    <div class="question-text">${s.q}</div>
    <div class="question-sub">${s.sub}</div>
    <div class="opts cols-${s.cols}">${s.opts.map(o=>{
      const isSel=s.multi?(sel&&sel.includes(o.v)):sel===o.v;
      return`<button class="opt${isSel?' sel':''}" onclick="pick('${s.id}','${o.v}',${s.multi})"><span class="opt-icon">${o.i}</span><span><span class="opt-label">${o.l}</span><br><span class="opt-desc">${o.d}</span></span></button>`;
    }).join('')}</div>
    <div class="nav">
      ${i>0?'<button class="btn-back" onclick="back()">← Back</button>':'<span></span>'}
      <button class="btn-next${hasAns?' on':''}" id="nxt" onclick="next()">${i===steps.length-1?'See my recommendation →':'Next →'}</button>
    </div>`;
}
function pick(id,v,multi){
  if(multi){if(!ans[id])ans[id]=[];const x=ans[id].indexOf(v);x>-1?ans[id].splice(x,1):ans[id].push(v);}
  else ans[id]=v;
  render(cur);
}
function next(){if(cur<steps.length-1){cur++;render(cur);}else showResult();}
function back(){if(cur>0){cur--;render(cur);}}
function showResult(){
  document.getElementById('prog').style.width='100%';
  const rec=getRec();
  const addRo=ans.drinking==='yes'&&rec!==prods.ro;
  const roHtml=addRo?`<div class="rec-card" style="margin-top:10px">
    <div class="rec-card-header"><div class="rec-badge">${prods.ro.badge}</div><div class="rec-name" style="font-size:16px">${prods.ro.name}</div></div>
    <div class="rec-body"><div class="rec-why">${prods.ro.why}</div><ul class="rec-features">${prods.ro.features.map(f=>`<li>${f}</li>`).join('')}</ul>
    <div class="rec-price">From ${prods.ro.price}</div>
    <a class="btn-shop" href="${prods.ro.url}" target="_blank" style="background:#0F6E56">View RO system →</a></div></div>`:'';
  document.getElementById('body').innerHTML=`<div class="result-wrap">
    <div class="result-eyebrow">Your recommendation</div>
    <div class="result-heading">Based on your answers, here's the best system for your home.</div>
    <div class="rec-card">
      <div class="rec-card-header"><div class="rec-badge">${rec.badge}</div><div class="rec-name">${rec.name}</div></div>
      <div class="rec-body">
        <div class="rec-why">${rec.why}</div>
        <ul class="rec-features">${rec.features.map(f=>`<li>${f}</li>`).join('')}</ul>
        <div class="rec-price">From ${rec.price}<span>+ free shipping</span></div>
        <a class="btn-shop" href="${rec.url}" target="_blank">Shop this system →</a>
        <a class="btn-phone" href="tel:1-888-265-9001" target="_blank">📞 Speak with an expert — 1-888-265-9001</a>
      </div>
    </div>${roHtml}
    <div class="restart" onclick="restart()">← Start over</div>
  </div>`;
}
function restart(){ans={};cur=0;render(0);}
render(0);
</script>
</body>
</html>
